name: Sync APJ STS Skills to sts-management

on:
  push:
    branches:
      - commit
    paths:
      - 'databricks-skills/apj-sts/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync changed files to sts-management
        env:
          GH_TOKEN: ${{ secrets.STS_MANAGEMENT_PAT }}
          TARGET_REPO: databricks-field-eng/sts-management
          TARGET_PATH: skills/personal/saroj
          SOURCE_PATH: databricks-skills/apj-sts
        run: |
          # Get list of added/modified files in the source path
          CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- "$SOURCE_PATH/")

          if [ -z "$CHANGED" ]; then
            echo "No files changed in $SOURCE_PATH — skipping."
            exit 0
          fi

          for FILE in $CHANGED; do
            FILENAME=$(basename "$FILE")
            TARGET_FILE="$TARGET_PATH/$FILENAME"

            echo "Syncing $FILE -> $TARGET_REPO/$TARGET_FILE"

            # Base64 encode file content
            CONTENT=$(base64 -w 0 "$FILE")

            # Get current SHA of target file (needed for updates)
            SHA=$(gh api "repos/$TARGET_REPO/contents/$TARGET_FILE" \
              --jq '.sha' 2>/dev/null || echo "")

            if [ -n "$SHA" ]; then
              # Update existing file
              gh api "repos/$TARGET_REPO/contents/$TARGET_FILE" \
                --method PUT \
                --field message="Sync $FILENAME from ai-dev-kit (commit branch)" \
                --field content="$CONTENT" \
                --field sha="$SHA" \
                --jq '.content.html_url'
            else
              # Create new file
              gh api "repos/$TARGET_REPO/contents/$TARGET_FILE" \
                --method PUT \
                --field message="Sync $FILENAME from ai-dev-kit (commit branch)" \
                --field content="$CONTENT" \
                --jq '.content.html_url'
            fi
          done

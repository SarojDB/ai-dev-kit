resources:
  pipelines:
    sv_bank_transactions_fraud_sdp:
      name: sv_bank_transactions_fraud_sdp
      catalog: ${var.catalog}
      schema: ${var.bronze_schema}
      serverless: true

      # Phase 3: full medallion — bronze + silver + gold
      libraries:
        - glob:
            include: ../src/sv_bank_transactions_fraud_sdp/transformations/bronze/**
        - glob:
            include: ../src/sv_bank_transactions_fraud_sdp/transformations/silver/**
        - glob:
            include: ../src/sv_bank_transactions_fraud_sdp/transformations/gold/**

      configuration:
        catalog: ${var.catalog}
        bronze_schema: ${var.bronze_schema}
        silver_schema: ${var.silver_schema}
        gold_schema: ${var.gold_schema}
        raw_data_path: ${var.raw_data_path}
        schema_location_base: ${var.schema_location_base}

      permissions:
        - level: CAN_VIEW
          group_name: users

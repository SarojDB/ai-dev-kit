bundle:
  name: sv_saas_sdp

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog catalog name
    default: aibuilder_saas_demo

  bronze_schema:
    description: Bronze layer schema
    default: bronze_dev

  silver_schema:
    description: Silver layer schema
    default: silver_dev

  gold_schema:
    description: Gold layer schema
    default: gold_dev

  raw_data_path:
    description: Path to raw SaaS Parquet data in UC volume
    default: /Volumes/aibuilder_saas_demo/raw_data/saas_data

  schema_location_base:
    description: Base path for Auto Loader schema metadata (separate volume from raw data)
    default: /Volumes/aibuilder_saas_demo/raw_data/sv_saas_sdp_metadata/schemas

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-8debdea9-18d5.cloud.databricks.com
      profile: databricks_oneenv
    variables:
      catalog: aibuilder_saas_demo
      bronze_schema: bronze_dev
      silver_schema: silver_dev
      gold_schema: gold_dev

  prod:
    mode: production
    workspace:
      host: https://dbc-8debdea9-18d5.cloud.databricks.com
      profile: databricks_oneenv
      root_path: /Workspace/Users/saroj.venkatesh@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: aibuilder_saas_demo
      bronze_schema: prod_bronze
      silver_schema: prod_silver
      gold_schema: prod_gold
      schema_location_base: /Volumes/aibuilder_saas_demo/raw_data/sv_saas_sdp_metadata/schemas_prod
